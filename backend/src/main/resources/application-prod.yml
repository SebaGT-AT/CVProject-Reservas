server:
  forward-headers-strategy: native
  compression:
    enabled: true
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
logging:
  structured:
    format:
      console: logstash
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
