spring:
  application:
    name: reservas-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reservas}
    username: ${POSTGRES_USER:reservas}
    password: ${POSTGRES_PASSWORD:reservas_local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
server:
  shutdown: graceful
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    delivery: ${MAIL_DELIVERY:log}
    from: ${MAIL_FROM:no-reply@reservas.local}
  notifications:
    poll-delay-ms: ${NOTIFICATION_POLL_DELAY_MS:5000}
    initial-delay-ms: ${NOTIFICATION_INITIAL_DELAY_MS:5000}
    batch-size: ${NOTIFICATION_BATCH_SIZE:20}
    maximum-attempts: ${NOTIFICATION_MAXIMUM_ATTEMPTS:8}
    reminder-cron: "${NOTIFICATION_REMINDER_CRON:0 */15 * * * *}"
  integrations:
    google-calendar:
      enabled: ${GOOGLE_CALENDAR_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/integrations/google-calendar/callback}
      frontend-result-url: ${GOOGLE_FRONTEND_RESULT_URL:http://localhost:5173/perfil-profesional}
      token-encryption-key: ${GOOGLE_TOKEN_ENCRYPTION_KEY:bG9jYWwtZGV2LWdvb2dsZS1jYWxlbmRhci1rZXktMDE=}
      poll-delay-ms: ${GOOGLE_SYNC_POLL_DELAY_MS:5000}
      initial-delay-ms: ${GOOGLE_SYNC_INITIAL_DELAY_MS:10000}
      batch-size: ${GOOGLE_SYNC_BATCH_SIZE:20}
      maximum-attempts: ${GOOGLE_SYNC_MAXIMUM_ATTEMPTS:8}
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
    jwt:
      secret: ${JWT_SECRET:change-this-local-secret-with-at-least-32-characters}
      expiration-seconds: 900
    refresh:
      expiration-days: 30
      secure-cookie: ${SECURE_COOKIES:false}
    one-time-token:
      verification-hours: 24
      password-reset-minutes: 30
