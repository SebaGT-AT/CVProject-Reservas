spring:
  application:
    name: reservas-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reservas}
    username: ${POSTGRES_USER:reservas}
    password: ${POSTGRES_PASSWORD:reservas_local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
server:
  shutdown: graceful
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    delivery: ${MAIL_DELIVERY:log}
    from: ${MAIL_FROM:no-reply@reservas.local}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-local-secret-with-at-least-32-characters}
      expiration-seconds: 900
    refresh:
      expiration-days: 30
      secure-cookie: ${SECURE_COOKIES:false}
    one-time-token:
      verification-hours: 24
      password-reset-minutes: 30

