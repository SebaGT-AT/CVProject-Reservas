spring:
  application:
    name: reservas-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reservas}
    username: ${POSTGRES_USER:reservas}
    password: ${POSTGRES_PASSWORD:reservas_local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
server:
  shutdown: graceful
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-local-secret-with-at-least-32-characters}
      expiration-seconds: 900

