name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: reservas_test
          POSTGRES_USER: reservas
          POSTGRES_PASSWORD: reservas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reservas -d reservas_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_URL: jdbc:postgresql://localhost:5432/reservas_test
      POSTGRES_USER: reservas
      POSTGRES_PASSWORD: reservas_test
      JWT_SECRET: integration-test-secret-with-at-least-32-characters
      NOTIFICATION_INITIAL_DELAY_MS: 3600000
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - name: Unit and PostgreSQL integration tests
        run: mvn -B verify -Pintegration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  images:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t reservas-api:ci backend
      - run: docker build -t reservas-web:ci frontend
