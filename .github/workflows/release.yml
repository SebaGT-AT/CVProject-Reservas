name: Release images

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: reservas_release
          POSTGRES_USER: reservas
          POSTGRES_PASSWORD: reservas_release
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U reservas -d reservas_release"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DB_URL: jdbc:postgresql://localhost:5432/reservas_release
      POSTGRES_USER: reservas
      POSTGRES_PASSWORD: reservas_release
      JWT_SECRET: release-verification-secret-with-at-least-32-characters
      NOTIFICATION_INITIAL_DELAY_MS: 3600000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: mvn -B verify -Pintegration
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  publish:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        include:
          - name: reservas-api
            context: backend
          - name: reservas-web
            context: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image namespace
        run: echo "REGISTRY_NAMESPACE=ghcr.io/${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
