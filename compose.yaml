services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reservas}
      POSTGRES_USER: ${POSTGRES_USER:-reservas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reservas_local}
    ports:
      - "5432:5432"
    volumes:
      - reservas_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  reservas_postgres:

